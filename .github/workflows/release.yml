name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 Git tag，例如 v0.1.5"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  github-release:
    name: Build GitHub Release assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build release assets
        run: scripts/build-github-release.sh "${RELEASE_TAG}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare Docker tags
        run: echo "VERSION_NO_V=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PUNKDOM_VERSION=${{ env.VERSION_NO_V }}
          tags: |
            ghcr.io/wiltonh/punkdom:${{ env.RELEASE_TAG }}
            ghcr.io/wiltonh/punkdom:${{ env.VERSION_NO_V }}
            ghcr.io/wiltonh/punkdom:latest

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file dist/github-release/RELEASE_NOTES.md
            gh release upload "${RELEASE_TAG}" dist/github-release/punkdom-* dist/github-release/checksums.txt --clobber
          else
            gh release create "${RELEASE_TAG}" dist/github-release/punkdom-* dist/github-release/checksums.txt --title "${RELEASE_TAG}" --notes-file dist/github-release/RELEASE_NOTES.md
          fi
